<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H₂ + I₂ ⇌ 2HI • Collision Theory Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        canvas { image-rendering: crisp-edges; }
        .beaker {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            border: 12px solid #64748b;
            border-radius: 9999px 9999px 40% 40%;
            box-shadow: 0 0 80px -20px rgb(34 211 238);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-screen-xl mx-auto">
        <div class="flex items-center justify-between border-b border-slate-700 px-8 py-5">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-emerald-400 rounded-2xl flex items-center justify-center text-white text-3xl shadow-inner">🧪</div>
                <h1 class="title-font text-3xl tracking-[-1px]">H₂ + I₂ ⇌ 2HI</h1>
                <span class="px-4 py-1 text-sm font-semibold bg-gradient-to-r from-cyan-400 to-emerald-500 text-slate-950 rounded-3xl">MOLECULAR DYNAMICS SIM</span>
            </div>
            <div class="flex items-center gap-x-6">
                <button onclick="resetSim()" class="flex items-center gap-x-2 px-5 py-2.5 hover:bg-slate-800 rounded-3xl transition-colors">
                    <span>Reset</span>
                </button>
                <button onclick="togglePause()" id="pause-btn" class="flex items-center gap-x-2 px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-3xl transition-all">
                    <span id="pause-icon" class="text-xl">⏸️</span>
                    <span id="pause-text" class="font-semibold">PAUSE</span>
                </button>
            </div>
        </div>

        <div class="flex">
            <!-- LEFT PANEL -->
            <div class="w-72 bg-slate-900/80 backdrop-blur-xl border-r border-slate-700 p-6 flex flex-col">
                <div class="text-center mb-6">
                    <div class="text-5xl mb-1">H₂ + I₂ ⇌ 2HI</div>
                    <p class="text-emerald-400 text-sm tracking-wider">REVERSIBLE REACTION</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-2">TEMPERATURE</label>
                        <input type="range" id="temp-slider" min="200" max="600" value="298" class="w-full accent-cyan-400" oninput="updateTemp(this.value)">
                        <div class="flex justify-between text-xs"><span>200K</span><span id="temp-val" class="font-mono">298K</span><span>600K</span></div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-2">ACTIVATION ENERGY</label>
                        <input type="range" id="ea-slider" min="50" max="120" value="85" class="w-full accent-cyan-400" oninput="updateEa(this.value)">
                        <div class="flex justify-between text-xs"><span>50</span><span id="ea-val" class="font-mono">85 kJ/mol</span><span>120</span></div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <button onclick="addMolecules('H2', 30)" class="bg-blue-500/90 hover:bg-blue-600 py-3 rounded-2xl text-white">+ H₂</button>
                        <button onclick="addMolecules('I2', 30)" class="bg-purple-500/90 hover:bg-purple-600 py-3 rounded-2xl text-white">+ I₂</button>
                        <button onclick="addMolecules('HI', 40)" class="bg-emerald-500/90 hover:bg-emerald-600 py-3 rounded-2xl text-white">+ HI</button>
                    </div>

                    <div class="bg-slate-800 rounded-3xl p-4 text-sm space-y-3">
                        <div class="flex justify-between"><span class="text-blue-400">H₂</span><span id="count-h2" class="font-mono">38</span></div>
                        <div class="flex justify-between"><span class="text-purple-400">I₂</span><span id="count-i2" class="font-mono">32</span></div>
                        <div class="flex justify-between"><span class="text-emerald-400">HI</span><span id="count-hi" class="font-mono">125</span></div>
                    </div>
                </div>
            </div>

            <!-- CANVAS -->
            <div class="flex-1 flex items-center justify-center p-8">
                <div class="beaker w-[820px] h-[520px] relative shadow-2xl">
                    <canvas id="canvas" width="820" height="520" class="absolute inset-0"></canvas>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="w-80 p-6">
                <div class="text-xs uppercase mb-3 text-slate-400">Concentration vs Time</div>
                <canvas id="chart" height="340"></canvas>
                <div class="mt-8 text-xs space-y-6">
                    <div class="flex gap-3">
                        <span class="text-3xl">🧪</span>
                        <div>
                            <p class="font-medium">Collision Theory in Action</p>
                            <p class="text-slate-400 text-[10px]">Molecules collide → react when energy &gt; Ea. Dynamic equilibrium shown live.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Complete working simulation - H₂ + I₂ ⇌ 2HI molecular dynamics
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 820;
        const HEIGHT = 520;

        let particles = [];
        let isPaused = false;
        let temperature = 298;
        let activationEnergy = 85;
        let simTime = 0;
        let chartInstance = null;
        let chartData = { labels: [], h2: [], i2: [], hi: [] };

        const COLORS = { H2: '#3b82f6', I2: '#a855f7', HI: '#10b981' };
        const RADII = { H2: 7, I2: 9, HI: 8 };

        class Particle {
            constructor(type) {
                this.type = type;
                this.radius = RADII[type];
                this.x = this.radius + Math.random() * (WIDTH - 2 * this.radius);
                this.y = this.radius + Math.random() * (HEIGHT - 2 * this.radius);
                const speed = (temperature / 120) * (0.8 + Math.random());
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }
        }

        function addParticle(type) {
            particles.push(new Particle(type));
        }

        function updateCounts() {
            let c = { H2: 0, I2: 0, HI: 0 };
            particles.forEach(p => c[p.type]++);
            document.getElementById('count-h2').textContent = c.H2;
            document.getElementById('count-i2').textContent = c.I2;
            document.getElementById('count-hi').textContent = c.HI;
            return c;
        }

        function initChart() {
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [
                        { label: 'H₂', borderColor: COLORS.H2, data: chartData.h2, tension: 0.3 },
                        { label: 'I₂', borderColor: COLORS.I2, data: chartData.i2, tension: 0.3 },
                        { label: 'HI', borderColor: COLORS.HI, data: chartData.hi, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function updateChart() {
            if (simTime % 8 === 0) {
                const counts = updateCounts();
                chartData.labels.push(simTime);
                chartData.h2.push(counts.H2);
                chartData.i2.push(counts.I2);
                chartData.hi.push(counts.HI);
                if (chartData.labels.length > 60) {
                    chartData.labels.shift();
                    chartData.h2.shift();
                    chartData.i2.shift();
                    chartData.hi.shift();
                }
                if (chartInstance) chartInstance.update('none');
            }
        }

        function canReact(p1, p2) {
            if ((p1.type === 'H2' && p2.type === 'I2') || (p1.type === 'I2' && p2.type === 'H2')) {
                // Forward reaction probability scales with temp, inverse with Ea
                const prob = Math.exp(-activationEnergy / (temperature * 0.8)) * 0.35;
                return Math.random() < prob;
            }
            if (p1.type === 'HI' && p2.type === 'HI') {
                // Reverse reaction (lower Ea)
                const prob = Math.exp(- (activationEnergy * 0.65) / (temperature * 1.1)) * 0.25;
                return Math.random() < prob;
            }
            return false;
        }

        function performReaction(p1, p2) {
            if ((p1.type === 'H2' && p2.type === 'I2') || (p1.type === 'I2' && p2.type === 'H2')) {
                // H₂ + I₂ → 2 HI
                const idx1 = particles.indexOf(p1);
                const idx2 = particles.indexOf(p2);
                if (idx1 > -1) particles.splice(idx1, 1);
                if (idx2 > -1) particles.splice(idx2 > idx1 ? idx2 - 1 : idx2, 1);
                addParticle('HI');
                addParticle('HI');
            } else if (p1.type === 'HI' && p2.type === 'HI') {
                // 2 HI → H₂ + I₂
                const idx1 = particles.indexOf(p1);
                const idx2 = particles.indexOf(p2);
                if (idx1 > -1) particles.splice(idx1, 1);
                if (idx2 > -1) particles.splice(idx2 > idx1 ? idx2 - 1 : idx2, 1);
                addParticle('H2');
                addParticle('I2');
            }
        }

        function animate() {
            if (isPaused) {
                requestAnimationFrame(animate);
                return;
            }

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Move + wall bounce
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Simple wall bounce (beaker interior)
                if (p.x - p.radius < 10 || p.x + p.radius > WIDTH - 10) p.vx *= -0.95;
                if (p.y - p.radius < 10 || p.y + p.radius > HEIGHT - 10) p.vy *= -0.95;

                // Temperature scales speed slightly
                const speedFactor = (temperature / 298);
                const currentSpeed = Math.hypot(p.vx, p.vy);
                if (currentSpeed > 0) {
                    p.vx = (p.vx / currentSpeed) * (currentSpeed * 0.98 + 0.02 * speedFactor);
                    p.vy = (p.vy / currentSpeed) * (currentSpeed * 0.98 + 0.02 * speedFactor);
                }
            });

            // Collisions + reactions
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < p1.radius + p2.radius && dist > 0) {
                        // Elastic bounce (equal mass approx)
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const rvx = p1.vx - p2.vx;
                        const rvy = p1.vy - p2.vy;
                        const velAlong = rvx * nx + rvy * ny;
                        if (velAlong > 0) continue;

                        p1.vx -= velAlong * nx * 0.9;
                        p1.vy -= velAlong * ny * 0.9;
                        p2.vx += velAlong * nx * 0.9;
                        p2.vy += velAlong * ny * 0.9;

                        // Attempt reaction
                        if (canReact(p1, p2)) {
                            performReaction(p1, p2);
                            break;
                        }
                    }
                }
            }

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = COLORS[p.type];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                // Tiny label for visibility
                if (p.type === 'HI') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '9px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('HI', p.x, p.y + 3);
                }
            });

            simTime++;
            updateCounts();
            updateChart();

            requestAnimationFrame(animate);
        }

        // Controls
        window.updateTemp = function(val) {
            temperature = parseInt(val);
            document.getElementById('temp-val').textContent = val + 'K';
        };

        window.updateEa = function(val) {
            activationEnergy = parseInt(val);
            document.getElementById('ea-val').textContent = val + ' kJ/mol';
        };

        window.addMolecules = function(type, num) {
            for (let i = 0; i < num; i++) addParticle(type);
            updateCounts();
        };

        window.resetSim = function() {
            particles = [];
            chartData = { labels: [], h2: [], i2: [], hi: [] };
            for (let i = 0; i < 38; i++) addParticle('H2');
            for (let i = 0; i < 32; i++) addParticle('I2');
            for (let i = 0; i < 125; i++) addParticle('HI');
            simTime = 0;
            updateCounts();
            initChart();
        };

        window.togglePause = function() {
            isPaused = !isPaused;
            const icon = document.getElementById('pause-icon');
            const text = document.getElementById('pause-text');
            if (isPaused) {
                icon.textContent = '▶️';
                text.textContent = 'RESUME';
            } else {
                icon.textContent = '⏸️';
                text.textContent = 'PAUSE';
                animate();
            }
        };

        // Start
        window.onload = function() {
            // Tailwind ready
            for (let i = 0; i < 38; i++) addParticle('H2');
            for (let i = 0; i < 32; i++) addParticle('I2');
            for (let i = 0; i < 125; i++) addParticle('HI');
            updateCounts();
            initChart();
            animate();
        };
    </script>
</body>
</html>
